name: Nudge
options:
  bundleIdPrefix: app.nudge
  deploymentTarget:
    macOS: "11.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - Base
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "11.0"
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: $(NUDGE_TEAM_ID)
    CODE_SIGN_STYLE: Manual
    PRODUCT_BUNDLE_IDENTIFIER: app.nudge.Nudge
    ENABLE_APP_SANDBOX: false
    ENABLE_HARDENED_RUNTIME: true
targets:
  Nudge:
    type: application
    platform: macOS
    sources:
      - path: Nudge
    attributes:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Nudge/App/Nudge.entitlements
    settings:
      base:
        INFOPLIST_FILE: Nudge/App/Info.plist
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_ENTITLEMENTS: Nudge/App/Nudge.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    info:
      path: Nudge/App/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Nudge
        CFBundleDisplayName: Nudge
        CFBundleIdentifier: app.nudge.Nudge
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.3"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
        NSAccessibilityUsageDescription: "Nudge needs accessibility access to move and resize windows."
        LSMinimumSystemVersion: "11.0"
        NSPrincipalClass: NSApplication
  NudgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NudgeTests
      - path: Nudge/Core
      - path: Nudge/Helpers
      - path: Nudge/Models
      - path: Nudge/UI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.nudge.NudgeTests
schemes:
  Nudge:
    build:
      targets:
        Nudge: all
        NudgeTests: [test]
    test:
      targets:
        - NudgeTests
